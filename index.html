<!DOCTYPE html>
<html>
<head>
<title>College Assignment Tracker</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>College Assignment Tracker</h1>

<div class="form">

<input type="text" id="title" placeholder="Assignment Title">

<input type="text" id="subject" placeholder="Subject">

<input type="date" id="dueDate">

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button onclick="addAssignment()">Add Assignment</button>

</div>

<input type="text" id="search" placeholder="Search assignments">

<ul id="assignmentList"></ul>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>
</html>
