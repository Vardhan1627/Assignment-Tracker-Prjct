<!DOCTYPE html>
<html>
<head>
<title>Student Productivity Hub</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>📚 Student Productivity Hub</h1>

<div class="top-buttons">
<button id="darkToggle">🌙 Dark Mode</button>
<a href="dashboard.html">📊 Dashboard</a>
</div>

</header>

<section class="form">

<h2>Add Assignment</h2>

<input id="title" placeholder="Assignment Title">

<input id="subject" placeholder="Subject">

<input type="date" id="dueDate">

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="addAssignment()">Add Assignment</button>

</section>

<section class="search">
<input id="search" placeholder="🔎 Search assignments..." onkeyup="searchAssignments()">
</section>

<ul id="assignmentList"></ul>

<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/main.js"></script>

</body>
</html>
